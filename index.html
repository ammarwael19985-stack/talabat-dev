<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BranchPrep - تحضير الفروع بالباركود</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c9502f">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#12181f;
    --paper:#f5f3ee;
    --panel:#ffffff;
    --line:#dcd6c9;
    --accent:#1f6f5c;
    --accent-dark:#154d40;
    --warn:#b3452b;
    --muted:#6b6459;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Tahoma','Segoe UI',sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:20px 16px 60px;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 4px 20px;
    border-bottom:2px solid var(--ink);
    margin-bottom:22px;
  }
  header h1{font-size:1.15rem;margin:0;font-weight:800;}
  header .tag{
    font-size:.7rem;color:var(--muted);
    border:1px solid var(--line);padding:3px 8px;border-radius:20px;
  }
  .upload-card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:34px 22px;text-align:center;
  }
  .upload-card .icon{font-size:2.4rem;margin-bottom:8px;}
  .upload-card h2{font-size:1.05rem;margin:0 0 6px;}
  .upload-card p{color:var(--muted);font-size:.85rem;margin:0 0 20px;line-height:1.7;}
  .file-btn{
    display:inline-block;background:var(--accent);color:#fff;
    padding:13px 28px;border-radius:10px;font-weight:700;
    font-size:.95rem;cursor:pointer;border:none;
  }
  .file-btn:active{background:var(--accent-dark);}
  input[type=file]{display:none;}
  .hint-box{
    margin-top:22px;text-align:right;background:#faf8f2;
    border:1px dashed var(--line);border-radius:10px;
    padding:14px 16px;font-size:.78rem;color:var(--muted);line-height:2;
  }
  .hint-box b{color:var(--ink);}
  .col-toggle{
    display:flex;align-items:center;gap:8px;justify-content:center;
    margin-top:18px;font-size:.82rem;color:var(--ink);cursor:pointer;
  }
  .col-toggle input{width:18px;height:18px;cursor:pointer;}
  .status-bar{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;margin-bottom:16px;
    font-size:.78rem;color:var(--muted);
  }
  .status-bar b{color:var(--ink);}
  .status-bar button{
    background:none;border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;font-size:.75rem;color:var(--warn);cursor:pointer;
  }
  .scan-box{background:var(--ink);border-radius:14px;padding:20px;margin-bottom:18px;}
  .scan-box label{color:#c9c2b3;font-size:.8rem;display:block;margin-bottom:8px;}
  .scan-box input{
    width:100%;padding:16px 14px;font-size:1.3rem;border-radius:10px;
    border:none;text-align:center;letter-spacing:1px;font-weight:700;
  }
