<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BranchPrep - تحضير الفروع</title>
    
    <!-- PWA Manifest & App Icons -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12181f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BranchPrep">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- SheetJS Library for Excel Reading and Writing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg-color: #12181f;
            --card-bg: #1e2630;
            --accent-green: #1f6f5c;
            --accent-orange: #c9502f;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --row-highlight: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 12px;
            padding-bottom: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 15px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo img {
            width: 38px;
            height: 38px;
            border-radius: 8px;
        }

        .brand-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .status-badge {
            background-color: var(--accent-green);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .file-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
            font-size: 0.95rem;
        }

        .btn-green {
            background-color: var(--accent-green);
            border: none;
            color: #fff;
        }

        .btn-green:disabled {
            background-color: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        .file-info {
            background-color: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .scan-container {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--accent-green);
        }

        .barcode-input {
            width: 100%;
            padding: 14px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            font-weight: bold;
        }

        .barcode-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(31, 111, 92, 0.4);
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .product-barcode {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .instruction-box {
            background-color: rgba(201, 80, 47, 0.15);
            border-right: 4px solid var(--accent-orange);
            color: #f87171;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.82rem;
            margin-bottom: 15px;
        }

        .branches-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .branch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-color);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .branch-row.active {
            border-color: var(--accent-green);
            background-color: var(--row-highlight);
        }

        .branch-name {
            font-weight: 600;
            font-size: 0.95rem;
            flex: 1;
        }

        .branch-counts {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .count-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 45px;
        }

        .count-value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .count-label {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .auto-fill-btn {
            background-color: rgba(201, 80, 47, 0.2);
            color: var(--accent-orange);
            border: 1px solid var(--accent-orange);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            margin-left: 8px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-top: 10px;
            font-weight: 700;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .history-item {
            background-color: var(--card-bg);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">
            <img src="icon-192.png" alt="BranchPrep">
            <span class="brand-title">BranchPrep</span>
        </div>
        <span class="status-badge">تحضير الفروع</span>
    </header>

    <div class="file-controls">
        <label for="fileInput" class="btn">
            📁 رفع ملف جديد
        </label>
        <input type="file" id="fileInput" accept=".xlsx, .xls">
        
        <button id="exportBtn" class="btn btn-green" disabled>
            📊 تحميل تقرير التحضير
        </button>
    </div>

    <div class="file-info" id="fileInfo">
        <span>الملف: غير محدد</span>
        <span>المنتجات: 0</span>
    </div>

    <div class="scan-container">
        <form id="scanForm" onsubmit="return false;">
            <input type="text" id="barcodeInput" class="barcode-input" placeholder="اضرب الباركود دلوقتي" autocomplete="off" inputmode="none">
        </form>
    </div>

    <div id="productDisplay" style="display: none;">
        <div class="product-card">
            <div class="product-title" id="productName">-</div>
            <div class="product-barcode" id="productBarcode">-</div>
            
            <div class="instruction-box" id="instructionBox">
                اختر فرع للتحضير أو اضرب الباركود مباشرة
            </div>

            <div class="branches-list" id="branchesList">
                <!-- Branches dynamically rendered -->
            </div>

            <div class="total-row">
                <span>الإجمالي</span>
                <span id="totalPreparedCount">0</span>
            </div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">آخر عمليات المسح</div>
        <div id="historyList"></div>
    </div>

    <script>
        let excelData = [];
        let branchColumns = [];
        let currentProduct = null;
        let selectedBranch = null;

        const fileInput = document.getElementById('fileInput');
        const exportBtn = document.getElementById('exportBtn');
        const barcodeInput = document.getElementById('barcodeInput');
        const fileInfo = document.getElementById('fileInfo');
        const productDisplay = document.getElementById('productDisplay');
        const productName = document.getElementById('productName');
        const productBarcode = document.getElementById('productBarcode');
        const instructionBox = document.getElementById('instructionBox');
        const branchesList = document.getElementById('branchesList');
        const totalPreparedCount = document.getElementById('totalPreparedCount');
        const historyList = document.getElementById('historyList');

        // Keeping focus without auto-scrolling
        function focusBarcode() {
            barcodeInput.setAttribute('inputmode', 'none');
            barcodeInput.focus({ preventScroll: true });
        }

        // Always keep focus on Barcode Input
        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && !e.target.closest('label')) {
                focusBarcode();
            }
        });

        // Read Excel File
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                excelData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                if (excelData.length > 0) {
                    const keys = Object.keys(excelData[0]);
                    branchColumns = keys.filter(k => k !== 'باركود' && k !== 'اسم المنتج' && k !== 'Barcode' && k !== 'Product Name');
                    
                    fileInfo.innerHTML = `<span>الملف: ${file.name.substring(0, 15)}...</span> <span>المنتجات: ${excelData.length}</span>`;
                    exportBtn.disabled = false;
                    alert('تم تحميل الملف بنجاح! يمكنك البدء بالمسح الآن.');
                    focusBarcode();
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // Scan Barcode Form Submit
        document.getElementById('scanForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const scannedValue = barcodeInput.value.trim();
            barcodeInput.value = '';

            if (!scannedValue) return;

            if (currentProduct) {
                const isBarcodeOfCurrent = (currentProduct['باركود'] == scannedValue || currentProduct['Barcode'] == scannedValue);
                if (isBarcodeOfCurrent && selectedBranch) {
                    addCountToBranch(selectedBranch, 1);
                    focusBarcode();
                    return;
                }
            }

            // Find product by Barcode
            const foundProduct = excelData.find(row => row['باركود'] == scannedValue || row['Barcode'] == scannedValue);

            if (foundProduct) {
                currentProduct = foundProduct;
                selectedBranch = null;
                renderProductDetails();
                addToHistory(currentProduct['اسم المنتج'] || currentProduct['Product Name'], scannedValue);
            } else {
                alert('المنتج غير موجود في الملف!');
            }

            focusBarcode();
        });

        // Render Product & Branches
        function renderProductDetails() {
            productDisplay.style.display = 'block';
            productName.textContent = currentProduct['اسم المنتج'] || currentProduct['Product Name'] || 'منتج بدون اسم';
            productBarcode.textContent = currentProduct['باركود'] || currentProduct['Barcode'] || '';

            branchesList.innerHTML = '';
            let totalPrepared = 0;

            branchColumns.forEach(branch => {
                const required = parseInt(currentProduct[branch]) || 0;
                if (!currentProduct[`_prep_${branch}`]) currentProduct[`_prep_${branch}`] = 0;
                const prepared = currentProduct[`_prep_${branch}`];
                totalPrepared += prepared;

                const row = document.createElement('div');
                row.className = `branch-row ${selectedBranch === branch ? 'active' : ''}`;
                
                // CLICK EVENT WITH PREVENT SCROLL (Fixes scroll jump issue)
                row.addEventListener('click', () => {
                    selectedBranch = branch;
                    renderProductDetails();
                    focusBarcode();
                });

                row.innerHTML = `
                    <div class="branch-name">${branch}</div>
                    <div class="branch-counts">
                        <div class="count-box">
                            <span class="count-value" style="color: ${prepared >= required && required > 0 ? '#4ade80' : '#fff'}">${prepared}</span>
                            <span class="count-label">تم تحضيره</span>
                        </div>
                        <div class="count-box">
                            <span class="count-value" style="color: var(--text-muted)">${required}</span>
                            <span class="count-label">مطلوب</span>
                        </div>
                    </div>
                    <button class="auto-fill-btn" title="ملء مباشر">⚡</button>
                `;

                // Auto fill ⚡ Click Event (Fixes scroll jump issue)
                const autoBtn = row.querySelector('.auto-fill-btn');
                autoBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedBranch = branch;
                    currentProduct[`_prep_${branch}`] = required;
                    renderProductDetails();
                    focusBarcode();
                });

                branchesList.appendChild(row);
            });

            totalPreparedCount.textContent = totalPrepared;

            if (selectedBranch) {
                instructionBox.textContent = `تم تحديد: (${selectedBranch}) - اضرب الباركود للزيادة.`;
            } else {
                instructionBox.textContent = `اختر فرع بالضغط عليه، أو استخدم رمز (⚡) للملء المباشر.`;
            }
        }

        // Add count to selected branch
        function addCountToBranch(branch, amount) {
            if (!currentProduct) return;
            currentProduct[`_prep_${branch}`] = (currentProduct[`_prep_${branch}`] || 0) + amount;
            renderProductDetails();
        }

        // Add Scan to History
        function addToHistory(name, code) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>${name}</span><span>${code}</span>`;
            historyList.insertBefore(item, historyList.firstChild);
            if (historyList.children.length > 5) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        // Export Updated Excel File
        exportBtn.addEventListener('click', () => {
            if (excelData.length === 0) return;

            const exportData = excelData.map(row => {
                const newRow = { ...row };
                branchColumns.forEach(branch => {
                    if (newRow[`_prep_${branch}`] !== undefined) {
                        newRow[branch] = newRow[`_prep_${branch}`];
                        delete newRow[`_prep_${branch}`];
                    }
                });
                return newRow;
            });

            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "تقرير التحضير");
            XLSX.writeFile(workbook, "BranchPrep_Report.xlsx");
        });
    </script>
</body>
</html>
